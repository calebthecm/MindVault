<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindVault</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --dim: #6b7280;
      --text: #e5e7eb;
      --blaze: #ff6a00;
      --blaze2: #ff8a2a;
    }

    body {
      background: var(--ink);
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--blaze), var(--blaze2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #374151;
      margin-left: auto;
    }
    #status-dot.ok { background: #16a34a; }
    #status-dot.err { background: #dc2626; }

    #mode-select {
      background: var(--border);
      color: var(--dim);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
    }
    #mode-select:focus { outline: none; border-color: var(--blaze); color: var(--text); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 780px;
      width: 100%;
    }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, var(--blaze), var(--blaze2));
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }
    .msg.assistant .bubble.thinking {
      color: var(--dim);
      font-style: italic;
    }
    .bubble p + p,
    .bubble ul + p,
    .bubble pre + p,
    .bubble p + ul,
    .bubble ul + ul,
    .bubble pre + ul { margin-top: 10px; }
    .bubble h1, .bubble h2, .bubble h3 {
      font-size: 15px;
      margin: 12px 0 6px;
      color: #fff;
    }
    .bubble h1:first-child, .bubble h2:first-child, .bubble h3:first-child { margin-top: 0; }
    .bubble ul {
      padding-left: 18px;
      margin: 8px 0;
    }
    .bubble li + li { margin-top: 4px; }
    .bubble code {
      background: #171717;
      border: 1px solid #242424;
      border-radius: 6px;
      padding: 1px 5px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
    }
    .bubble pre {
      background: #0d0d0d;
      border: 1px solid #242424;
      border-radius: 10px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code {
      background: transparent;
      border: none;
      padding: 0;
      font-size: 12px;
    }
    .bubble a {
      color: var(--blaze2);
      text-decoration: none;
    }
    .bubble a:hover { text-decoration: underline; }

    .sources {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .source-chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--border);
      color: var(--dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }
    .source-chip .score { color: var(--blaze2); margin-left: 4px; }

    form {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    #input {
      flex: 1;
      background: var(--ink);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      min-height: 42px;
      max-height: 140px;
      font-family: inherit;
    }
    #input:focus { outline: none; border-color: var(--blaze); }
    #input::placeholder { color: var(--dim); }

    button[type=submit] {
      background: linear-gradient(135deg, var(--blaze), var(--blaze2));
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
    }
    button[type=submit]:disabled { opacity: 0.5; cursor: not-allowed; }

    #empty {
      margin: auto;
      text-align: center;
      color: var(--dim);
    }
    #empty h2 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--blaze), var(--blaze2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    #empty p { font-size: 14px; }
  </style>
</head>
<body>

<header>
  <h1>MindVault</h1>
  <select id="mode-select">
    <option value="CHAT">💬 CHAT</option>
    <option value="PLAN">📋 PLAN</option>
    <option value="DECIDE">🗳 DECIDE</option>
    <option value="DEBATE">⚖ DEBATE</option>
    <option value="REFLECT">🔍 REFLECT</option>
    <option value="EXPLORE">🕸 EXPLORE</option>
  </select>
  <div id="status-dot" title="Connecting..."></div>
</header>

<div id="messages">
  <div id="empty">
    <h2>Your Brain</h2>
    <p>Ask anything from your memory.</p>
  </div>
</div>

<form id="chat-form">
  <textarea
    id="input"
    placeholder="Ask your brain anything…"
    rows="1"
    autocomplete="off"
  ></textarea>
  <button type="submit" id="send-btn">Send</button>
</form>

<script>
  const messagesEl = document.getElementById('messages');
  const form = document.getElementById('chat-form');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const statusDot = document.getElementById('status-dot');
  const modeSelect = document.getElementById('mode-select');
  const emptyEl = document.getElementById('empty');

  // Check server status
  fetch('/api/status')
    .then(r => r.json())
    .then(d => {
      statusDot.className = 'ok';
      statusDot.title = `MindVault v${d.version} — connected`;
    })
    .catch(() => {
      statusDot.className = 'err';
      statusDot.title = 'Server unreachable';
    });

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  // Submit on Enter (Shift+Enter = newline)
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function renderInlineMarkdown(text) {
    let html = escapeHtml(text);
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
    return html;
  }

  function renderMarkdown(text) {
    const escaped = text.replace(/\r\n/g, '\n');
    const codeBlocks = [];
    const withBlocks = escaped.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
      const block = `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
      codeBlocks.push(block);
      return `@@CODEBLOCK_${codeBlocks.length - 1}@@`;
    });

    const paragraphs = withBlocks.split(/\n\s*\n/);
    const html = paragraphs.map(block => {
      const trimmed = block.trim();
      if (!trimmed) return '';
      if (/^@@CODEBLOCK_\d+@@$/.test(trimmed)) return trimmed;
      if (/^#{1,3}\s/.test(trimmed)) {
        const level = trimmed.match(/^#+/)[0].length;
        return `<h${level}>${renderInlineMarkdown(trimmed.replace(/^#{1,3}\s+/, ''))}</h${level}>`;
      }
      if (trimmed.split('\n').every(line => /^\s*[-*]\s+/.test(line))) {
        const items = trimmed.split('\n')
          .map(line => line.replace(/^\s*[-*]\s+/, '').trim())
          .filter(Boolean)
          .map(line => `<li>${renderInlineMarkdown(line)}</li>`)
          .join('');
        return `<ul>${items}</ul>`;
      }
      return `<p>${trimmed.split('\n').map(line => renderInlineMarkdown(line)).join('<br>')}</p>`;
    }).join('');

    return html.replace(/@@CODEBLOCK_(\d+)@@/g, (_, idx) => codeBlocks[Number(idx)]);
  }

  function setBubbleContent(bubble, role, text) {
    if (role === 'assistant') {
      bubble.innerHTML = renderMarkdown(text);
    } else {
      bubble.textContent = text;
    }
  }

  function renderSources(container, sources = []) {
    const old = container.querySelector('.sources');
    if (old) old.remove();
    if (sources.length === 0) return;

    const chips = document.createElement('div');
    chips.className = 'sources';
    sources.forEach(s => {
      const chip = document.createElement('div');
      chip.className = 'source-chip';
      const label = s.title || s.chunk_id || 'source';
      chip.innerHTML = `${escapeHtml(label.slice(0, 28))}<span class="score">${s.score}</span>`;
      chip.title = label;
      chips.appendChild(chip);
    });
    container.appendChild(chips);
  }

  function appendMessage(role, text, sources = []) {
    if (emptyEl) emptyEl.remove();

    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (text === '…' ? ' thinking' : '');
    setBubbleContent(bubble, role, text);
    msg.appendChild(bubble);
    renderSources(msg, sources);

    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return { msg, bubble };
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const query = input.value.trim();
    if (!query) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', query);
    const { msg: assistantMsg, bubble: thinkingBubble } = appendMessage('assistant', '…');

    try {
      const res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query,
          mode: modeSelect.value,
          include_private: false,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        thinkingBubble.className = 'bubble';
        setBubbleContent(thinkingBubble, 'assistant', `Error: ${err.detail || 'request failed'}`);
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let answer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        let boundary = buffer.indexOf('\n\n');
        while (boundary !== -1) {
          const rawEvent = buffer.slice(0, boundary);
          buffer = buffer.slice(boundary + 2);

          let eventName = 'message';
          let data = '';
          rawEvent.split('\n').forEach(line => {
            if (line.startsWith('event:')) eventName = line.slice(6).trim();
            if (line.startsWith('data:')) data += line.slice(5).trim();
          });

          if (eventName === 'token') {
            answer += JSON.parse(data);
            thinkingBubble.className = 'bubble';
            setBubbleContent(thinkingBubble, 'assistant', answer);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          } else if (eventName === 'done') {
            const payload = JSON.parse(data);
            answer = payload.answer || answer;
            thinkingBubble.className = 'bubble';
            setBubbleContent(thinkingBubble, 'assistant', answer);
            renderSources(assistantMsg, payload.sources || []);
          } else if (eventName === 'error') {
            thinkingBubble.className = 'bubble';
            setBubbleContent(thinkingBubble, 'assistant', `Error: ${JSON.parse(data)}`);
          }

          boundary = buffer.indexOf('\n\n');
        }
      }

    } catch (err) {
      thinkingBubble.className = 'bubble';
      setBubbleContent(thinkingBubble, 'assistant', `Failed to reach MindVault server: ${err.message}`);
    } finally {
      sendBtn.disabled = false;
      input.focus();
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  });
</script>
</body>
</html>
