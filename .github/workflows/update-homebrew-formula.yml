name: Update Homebrew Formula

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build formula for (e.g. v0.5.460)"
        required: true

jobs:
  update-homebrew:
    runs-on: ubuntu-latest

    steps:
      - name: Set release values
        shell: bash
        run: |
          # On release events use the tag; on manual dispatch use the input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "VERSION=${TAG}" >> "$GITHUB_ENV"
          echo "TARBALL_URL=https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz" >> "$GITHUB_ENV"

      - name: Download source tarball
        shell: bash
        run: |
          curl -L "$TARBALL_URL" -o mindvault.tar.gz

      - name: Compute SHA256
        shell: bash
        run: |
          # Strip all whitespace to prevent truncation in heredoc expansion
          SHA256_RAW=$(sha256sum mindvault.tar.gz | awk '{print $1}' | tr -d '[:space:]')
          echo "SHA256=${SHA256_RAW}" >> "$GITHUB_ENV"
          echo "Computed SHA256: ${SHA256_RAW} (${#SHA256_RAW} chars)"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: calebthecm/homebrew-mindvault
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
          persist-credentials: false

      - name: Ensure Formula folder exists
        shell: bash
        run: mkdir -p tap/Formula

      - name: Write formula
        shell: bash
        run: |
          # Strip leading 'v' from version tag (v0.5.301 → 0.5.301)
          PYPI_VERSION="${VERSION#v}"
          cat > tap/Formula/mindvault.rb <<EOF
          class Mindvault < Formula
            desc "Local-first second brain — chat with your own knowledge"
            homepage "https://github.com/calebthecm/MindVault"
            url "${TARBALL_URL}"
            sha256 "${SHA256}"
            license "MIT"
            version "${PYPI_VERSION}"

            depends_on "python@3.12"

            def install
              # Use python -m venv directly — includes pip by default,
              # unlike Homebrew's virtualenv_create which uses --without-pip
              # and can fail to bootstrap pip on some systems.
              python = Formula["python@3.12"].opt_bin/"python3.12"
              system python, "-m", "venv", libexec
              system libexec/"bin/pip3", "install", "."
              bin.install_symlink libexec/"bin/mindvault"
            end

            def caveats
              <<~EOS
                MindVault stores your brain data in ~/.mindvault/

                To get started:
                  mindvault setup

                For local LLM support, install Ollama first:
                  brew install ollama
                  ollama pull nomic-embed-text
                  ollama pull llama3.2
              EOS
            end

            test do
              assert_match "mindvault", shell_output("#{bin}/mindvault --help 2>&1", 0)
            end
          end
          EOF

      - name: Commit and push to tap repo
        shell: bash
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mindvault.rb
          git diff --cached --quiet && exit 0
          git commit -m "Update mindvault formula for ${VERSION} [skip ci]"
          git push https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/calebthecm/homebrew-mindvault.git HEAD:main
