name: Update Homebrew Formula

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-homebrew:
    runs-on: ubuntu-latest

    steps:
      - name: Set release values
        shell: bash
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "TARBALL_URL=https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Download source tarball
        shell: bash
        run: |
          curl -L "$TARBALL_URL" -o mindvault.tar.gz

      - name: Compute SHA256
        shell: bash
        run: |
          echo "SHA256=$(sha256sum mindvault.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: calebthecm/homebrew-mindvault
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
          persist-credentials: false

      - name: Ensure Formula folder exists
        shell: bash
        run: mkdir -p tap/Formula

      - name: Write formula
        shell: bash
        run: |
          cat > tap/Formula/mindvault.rb <<EOF
          class Mindvault < Formula
            include Language::Python::Virtualenv

            desc "Local-first second brain RAG system"
            homepage "https://github.com/calebthecm/MindVault"
            url "${TARBALL_URL}"
            sha256 "${SHA256}"
            license "Proprietary"

            depends_on "python@3.12"

            def install
              virtualenv_install_with_resources
            end

            def caveats
              <<~EOS
                MindVault also expects Ollama to be installed and running.

                Then run:
                  ollama pull nomic-embed-text
                  ollama pull llama3.2
                  mindvault setup
              EOS
            end

            test do
              system "#{bin}/mindvault", "--help"
            end
          end
          EOF

      - name: Commit and push to tap repo
        shell: bash
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mindvault.rb
          git diff --cached --quiet && exit 0
          git commit -m "Update mindvault formula for ${VERSION} [skip ci]"
          git push https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/calebthecm/homebrew-mindvault.git HEAD:main